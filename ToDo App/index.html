<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="main-title">
            <h1>ToDo List</h1>
        </div>

            <form action="#">
                <div class="input-box">
                    <input type="text" placeholder="Add your new items here!" id="AddNewItem" onfocus="this.placeholder=''" onblur="this.placeholder='Add your new items here!'" class="item-field" label="item-field" autofocus name="Add your items here!">

                    <button class="submit-new-item" id="submit-button" type="submit">Submit</button>
                    <button class="clear-list" type="reset">Clear List</button>
                </div>
            </form>


        <div class="todo-container">
            <ul class="items-list"></ul>
        </div>
        
                
            
        </div>
        


    </div>
    <script src="script.js"></script>
</html>
