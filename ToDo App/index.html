<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main-container">
        <div class="main-title">
            <!-- <h1>ToDo List</h1> -->
        </div>

        <form id="MainForm" name="contact-form" >
            <div class="input-box">
                <input type="text" required="required" placeholder="Add your new items here!"
                    id="AddNewItem" onfocus="this.placeholder=''" onblur="this.placeholder='Add your new items here!'"
                    class="item-field" label="item-field" autofocus name="NewItemInput">
                    <div class="error-hint hidden">Value is required</div>

                <button class="submit-new-item" id="submit-button" type="submit">Submit</button>
                
                <button class="clear-list" type="reset">Clear List</button>
            </div>
        </form>


        <div class="wrapper">

            <div class="completed-container">
                <div class="completed-title">
                    <h3 class="completed-title">Completed tasks:</h3>
                    <img src="" alt="">
                </div>
                    <ul class="completed-list"></ul>
            </div>
            <div class="todo-container">
                <ul id="items-list-container" class="items-list"></ul>
            </div>

           

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
